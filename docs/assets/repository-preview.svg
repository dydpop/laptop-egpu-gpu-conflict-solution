<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Laptop eGPU hybrid GPU conflict solution</title>
  <desc id="desc">Bilingual repository preview for a Windows laptop eGPU and hybrid GPU conflict diagnostics toolkit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8fb"/>
      <stop offset="0.56" stop-color="#eef4f7"/>
      <stop offset="1" stop-color="#f8faf2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f6f73"/>
      <stop offset="1" stop-color="#68783b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#244047" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="60" y="56" width="1160" height="528" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="60" y="56" width="1160" height="528" rx="28" fill="none" stroke="#d6dde0"/>
  <rect x="60" y="56" width="1160" height="10" fill="url(#accent)"/>

  <g transform="translate(104 112)">
    <text x="0" y="0" fill="#17272b" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="800">
      Laptop eGPU Conflict Toolkit
    </text>
    <text x="0" y="62" fill="#2e3b3f" font-family="Microsoft YaHei UI, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">
      笔记本外接显卡坞 / 混合 GPU 冲突解决方案
    </text>
    <text x="0" y="118" fill="#536266" font-family="Segoe UI, Arial, sans-serif" font-size="24">
      Intel integrated GPU + NVIDIA external GPU diagnostics for Windows 11
    </text>
  </g>

  <g transform="translate(106 298)">
    <rect x="0" y="0" width="252" height="130" rx="18" fill="#edf5f2" stroke="#b9cecb"/>
    <text x="32" y="46" fill="#203136" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Intel iGPU</text>
    <text x="32" y="86" fill="#526166" font-family="Segoe UI, Arial, sans-serif" font-size="18">desktop + fallback</text>

    <rect x="360" y="0" width="252" height="130" rx="18" fill="#f4f6ea" stroke="#ccd2ae"/>
    <text x="392" y="46" fill="#203136" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">NVIDIA eGPU</text>
    <text x="392" y="86" fill="#526166" font-family="Segoe UI, Arial, sans-serif" font-size="18">graphics + compute</text>

    <path d="M270 65 H336" stroke="#6f7b7d" stroke-width="8" stroke-linecap="round"/>
    <path d="M322 47 L342 65 L322 83" fill="none" stroke="#6f7b7d" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="720" y="0" width="328" height="130" rx="18" fill="#f8f8f6" stroke="#cfd6d5"/>
    <text x="752" y="42" fill="#203136" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">WHEA 17 / TDR / DXGI</text>
    <text x="752" y="78" fill="#526166" font-family="Segoe UI, Arial, sans-serif" font-size="18">hot-plug diagnostics</text>
    <text x="752" y="106" fill="#526166" font-family="Microsoft YaHei UI, Segoe UI, Arial, sans-serif" font-size="18">热插拔、回滚、支持包</text>
  </g>

  <g transform="translate(106 490)" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    <text x="0" y="0" fill="#536266">State-aware PowerShell toolkit</text>
    <circle cx="318" cy="-7" r="5" fill="#2f6f73"/>
    <text x="338" y="0" fill="#536266">Privacy-aware by default</text>
    <circle cx="602" cy="-7" r="5" fill="#2f6f73"/>
    <text x="622" y="0" fill="#536266">Rollback-first operations</text>
  </g>
</svg>
